# 外挂模式数据源配置文件
# 密码使用 ${ENV_VAR} 占位符，运行时从环境变量获取真实值

datasources:
  clickhouse_prod:
    dialect: clickhouse
    version: "24.x"
    host: 10.0.1.100
    port: 9000
    database: analytics
    username: reader
    password: ${CK_PROD_PASSWORD}
    description: 生产环境 ClickHouse 订单库
    extra_params:
      connect_timeout: 5
      query_retries: 0
    tags:
      - 生产
      - 只读

  clickhouse_test:
    dialect: clickhouse
    version: "24.8"
    host: 192.168.195.133
    port: 9000
    database: analytics
    username: reader
    password: ${CLICKHOUSE_PASSWORD}
    description: ClickHouse 24.8 测试库
    extra_params:
      connect_timeout: 5
      query_retries: 0
    tags:
      - 测试
      - clickhouse

  mysql_test:
    dialect: mysql
    version: "8.0"
    host: 192.168.195.133
    port: 3306
    database: test
    username: root
    password: ${MYSQL_PASSWORD}
    description: MySQL 8.0 测试库
    tags:
      - 测试
      - mysql

  postgres_main:
    dialect: postgres
    version: "16"
    host: 192.168.195.133
    port: 5432
    database: postgres
    username: postgres
    password: ${PG_PASSWORD}
    description: PostgreSQL 16 主库
    tags:
      - 测试
      - postgres

  oracle_xe:
    dialect: oracle
    version: "21c"
    host: 192.168.195.133
    port: 1521
    database: XEPDB1
    username: TEST_USER
    password: ${ORACLE_PASSWORD}
    description: Oracle XE 21c 测试库
    tags:
      - 测试
      - oracle

  mssql_express:
    dialect: mssql
    version: "2019"
    host: 192.168.195.133
    port: 1433
    database: master
    username: sa
    password: ${MSSQL_PASSWORD}
    description: SQL Server 2019 Express
    tags:
      - 测试
      - mssql
